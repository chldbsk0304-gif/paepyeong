// 상품명 키워드로 스타일 태그 추론
function inferStyleTags(name) {
  const n = name.toLowerCase();
  const tags = new Set();

  if (/나이키|nike|룰루레몬|lululemon|뉴발란스|new.?balance|언더아머|under.?armour|아디다스|adidas|레깅스|트레이닝 팬츠|스포츠|athletic|running|workout|짐|gym/.test(n)) tags.add('스포티');
  if (/고프코어|gorp|고프|아웃도어|outdoor|플리스|fleece|나일론|nylon|카고(?! 팬츠)|테크웨어|tech.?wear|등산|하이킹/.test(n)) tags.add('고프코어');
  if (/베이프|bape|스트릿|street|그래픽 티|graphic.?tee|카모|camo|힙합|hip.?hop|스케이트|skate|빅실루엣|오버사이즈|oversize/.test(n)) tags.add('스트릿');
  if (/폴로 랄프|polo ralph|래글런|프레피|preppy|카라티(?!셔츠)|피케이|pique|크루넥 스트라이프|아가일/.test(n)) tags.add('프레피');
  if (/랄프 로렌|ralph lauren|클래식|classic|슬랙스|블레이저|blazer|트위드|tweed|수트|suit/.test(n)) tags.add('클래식');
  if (/프릴|frill|러플|ruffle|레이스|lace|꽃무늬|floral|리본|ribbon|홀터|halter|블라우스|blouse|로맨틱|romantic|시스루|see.?through|쉬폰|chiffon/.test(n)) tags.add('로맨틱');
  if (/빈티지|vintage|레트로|retro|체크|check|y2k|90s|80s|아카이브|archive|워싱|washed/.test(n)) tags.add('레트로');
  if (/에센셜|essential|베이직|basic|미니멀|minimal|심플|simple|무신사 스탠다드|musinsa standard|솔리드|solid|에르트르|ertr/.test(n)) tags.add('미니멀');
  if (/디키즈|dickies|카고 팬츠|cargo pants|워크웨어|workwear|오버롤|overall|유틸리티|utility|덩거리|dungaree/.test(n)) tags.add('워크웨어');
  if (/린넨|linen|리조트|resort|비치|beach|트로피칼|tropical|하와이안|hawaiian|레이온|rayon/.test(n)) tags.add('리조트');
  if (/에스닉|ethnic|보헤미안|bohemian|페이즐리|paisley|인디안|indian|아프리칸|african/.test(n)) tags.add('에스닉');
  if (/갤러리|gallery|아트웨어|art wear|아방|avant|조형|조각|sculpture|conceptual/.test(n)) tags.add('갤러리');
  if (/시크|chic|드레이프|drape|슬릭|sleek|모노톤|monotone|올블랙|all.?black/.test(n)) tags.add('시크');
  if (/시티보이|city.?boy|어반|urban|스트리트웨어/.test(n)) tags.add('시티보이');

  if (tags.size === 0) tags.add('캐주얼');
  return [...tags];
}

// 선택된 아이템 목록으로 최적 아바타 매핑
function mapAvatar(selectedItems) {
  const allStyles = selectedItems.flatMap(item => inferStyleTags(item.name));

  const scores = AVATAR_DATA.map(avatar => {
    let score = 0;
    for (const style of allStyles) {
      if (avatar.primaryStyles.includes(style)) score += 1;
      else if (avatar.secondaryStyles.includes(style)) score += 0.5;
    }
    return { avatar, score };
  });

  // 동점이면 id 낮은 쪽 우선 (reduce는 앞쪽을 유지)
  const best = scores.reduce((a, b) => b.score > a.score ? b : a);
  return {
    avatarId: best.avatar.id,
    imagePath: `assets/avatars/avatar_${best.avatar.id}.png`,
    bodyData: best.avatar.bodyData,
    detectedStyles: [...new Set(allStyles)],
  };
}

async function evaluateWithClaude(type, data) {
  const systemPrompt = `당신은 패션 평가 AI입니다. 유저가 업로드한 코디 이미지를 분석하고, 아래 기준에 따라 평가하세요. 다른 텍스트 없이 JSON만 출력하세요.

## 점수 평가 기준 (총 100점)
- 스타일 완성도 (30점): 의도한 스타일 방향에 맞게 코디했는가 / 스타일 파괴 요소가 없는가
- 아이템 매칭 (25점): 소재·핏·무드의 아이템 간 일관성 / 상하의 밸런스
- 색조합 (25점): 색상 수 적절성(기본 3색 이내) / 색 조합 패턴의 조화
- 핏/실루엣 (20점): 아이템이 의도에 맞게 착용되었는가 / 전체 실루엣 균형

## 채점 원칙
- "무난함"은 70% 이하로 처리. 진짜 잘한 것만 높은 점수
- 아이템이 비싸거나 브랜드가 있어도 조화가 없으면 감점
- 보이지 않는 아이템(신발, 가방 등)은 "미확인"으로 처리하되 감점 요소로 언급
- 이미지가 불명확하거나 전신이 안 보이면 확인 가능한 부분만 평가

## 등급: S(90-100점), A(75-89점), B(60-74점), C(45-59점), F(0-44점)

## 네이밍 규칙 (naming 필드)
- 반드시 다음 구조 중 하나: 명사+명사 / 형용사+명사 / 동사+명사
- 예시: "용팔이 상경룩 😂", "아슬아슬 도전룩 😬", "튀려다 묻힌 룩 😅"
- 한국인이 듣자마자 그림이 그려지는 레퍼런스 사용, 이모지 1개 필수
- 평범한 패션 용어 금지 ("캐주얼룩", "스트릿룩" 불가)

## 킹받는 첫 줄 말투 (oneLiner 필드) — 등급별 필수 적용, 반드시 50자 이내
S: 진심으로 감탄하는 톤. 과장 없이 쿨하게 칭찬.
A: 아쉬움을 귀엽고 유치하게 표현하는 톤. 어린아이처럼 투정 부리는 느낌.
B: 예상했다는 듯 슬쩍 비꼬는 톤. 비난이 아니라 장난기 있게.
C: 억울하고 방어적인 톤. 내 잘못 아니라는 듯 튕기는 느낌.
F: 위의 세 가지 감정이 뒤섞인 혼돈의 톤.

oneLiner 작성 규칙:
- 예시 문장을 절대 그대로 쓰지 말 것
- 코디의 구체적인 요소(색, 아이템, 조합 등)를 언급해서 그 코디에만 해당하는 문장 생성
- 자연스러운 한국어 구어체로 작성
- ㅠㅠ, ㅋㅋ 같은 표현은 톤에 맞을 때만 자연스럽게 사용 (이모지는 추가 금지)
- 옷에만 집중, 인격 공격 절대 금지

## 상세 설명 (summary 필드)
- 친절한 존댓말로 작성
- 반드시 아래 3개 문단 구조로 작성하고, 문단 사이는 \n\n(빈 줄)으로 구분:
  문단1: 전체적인 코디 평가 및 잘된 점 (칭찬 먼저)
  문단2: 아쉬운 점 또는 문제 지적 (핵심 1~2가지만)
  문단3: 개선 팁 또는 제안 (구체적 행동)
- 전문 용어 금지 ("위아래가 따로 노는 느낌", "색이 너무 싸우고 있어요" 식으로)

## 핵심 넛지 (nudge 필드)
- 현재 등급에서 한 단계 올라가기 위한 행동 1가지
- 포맷: "한 가지만 바꾼다면: [구체적 조언]"

반드시 아래 JSON 형식으로만 응답:
{"totalScore":숫자,"grade":"S/A/B/C/F","naming":"네이밍+이모지","oneLiner":"킹받는첫줄","summary":"상세설명","nudge":"핵심넛지","scores":{"styleCompleteness":숫자0-30,"itemMatching":숫자0-25,"colorCombination":숫자0-25,"fitSilhouette":숫자0-20}}`;

  let messages;
  if (type === 'ootd') {
    messages = [{ role: 'user', content: [
      { type: 'image', source: { type: 'base64', media_type: data.mediaType, data: data.base64 } },
      { type: 'text', text: '이 OOTD 사진을 패션 전문가로서 평가해주세요.' },
    ]}];
  } else if (type === 'ootd_multi') {
    messages = [{ role: 'user', content: [
      ...data.map(img => ({ type: 'image', source: { type: 'base64', media_type: img.mediaType, data: img.base64 } })),
      { type: 'text', text: `이 ${data.length}장의 OOTD 사진들을 종합적으로 평가해주세요.` },
    ]}];
  } else {
    messages = [{ role: 'user', content: `다음 아이템들로 구성된 코디를 평가해주세요:\n\n${data}` }];
  }

  const resp = await fetch(EVALUATE_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: systemPrompt, messages }),
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`API 오류 (${resp.status}): ${errText}`);
  }
  const json = await resp.json();
  const text = json.content[0].text;
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('응답 파싱 실패');
  return JSON.parse(match[0]);
}

// ═══════════════════════════════════════════════════════════════
// IMAGE COMPRESSION — Canvas 리사이즈 + JPEG 압축 (413 방지)
// ═══════════════════════════════════════════════════════════════

// maxSize 512px + 장당 base64 400KB 상한 보장
// → 3장 합계 최대 ~1.2MB, Vercel 4.5MB 제한 안전하게 통과
function compressImage(file, maxSize = 512, quality = 0.65) {
  return new Promise((resolve, reject) => {
    const objUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onerror = () => { URL.revokeObjectURL(objUrl); reject(new Error('이미지 로드 실패')); };
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else        { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(objUrl);

      // 장당 base64 상한: 400KB (3장 × 400KB = 1.2MB ≪ 4.5MB 제한)
      const MAX_B64 = 400 * 1024;
      let q = quality;
      let dataUrl;
      do {
        dataUrl = canvas.toDataURL('image/jpeg', q);
        if (dataUrl.length <= MAX_B64 || q <= 0.3) break;
        q = Math.round((q - 0.1) * 10) / 10;
      } while (true);

      resolve(dataUrl);
    };
    img.src = objUrl;
  });
}

// ── OOTD 착장 AI 분석 ──────────────────────────────────────────
async function analyzeOotdForItems(imageDataUrl) {
  const commaIdx = imageDataUrl.indexOf(',');
  const meta      = imageDataUrl.slice(0, commaIdx);
  const b64       = imageDataUrl.slice(commaIdx + 1);
  const mediaType = (meta.match(/:(.*?);/) || [])[1] || 'image/jpeg';

  const systemPrompt =
    `당신은 패션 아이템 인식 AI입니다. 이미지 속 착용 중인 의류·신발·가방·소품을 모두 분석하세요.\n` +
    `각 아이템을 다음 JSON 배열로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요.\n\n` +
    `category 값(반드시 아래 중 하나): "상의" | "아우터" | "바지" | "원피스/스커트" | "신발" | "가방" | "소품"\n` +
    `brand: 로고·라벨이 식별되면 브랜드명, 불가면 null\n` +
    `name: 제품명이 식별되면 기재, 불가면 색상·소재·실루엣 기반 설명 (예: "오버핏 흰색 크루넥 티셔츠")\n` +
    `price: 가격 식별 가능하면 숫자(원 단위), 불가면 null\n\n` +
    `[{"category":"...","brand":...,"name":"...","price":...}]`;

  const messages = [{ role: 'user', content: [
    { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
    { type: 'text', text: '이 OOTD 사진에서 착용한 모든 아이템을 분석해주세요.' },
  ]}];

  const resp = await fetch(EVALUATE_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: systemPrompt, messages }),
  });
  if (!resp.ok) throw new Error(`AI 분석 오류 (${resp.status})`);
  const data = await resp.json();
  const text = (data?.content?.[0]?.text || data?.content || '').trim();
  const match = text.match(/\[[\s\S]*\]/);
  if (!match) throw new Error('아이템 인식 결과를 파싱할 수 없어요');
  return JSON.parse(match[0]);
}

function useCountUp(target, duration = 1400, delay = 200) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf;
    const t = setTimeout(() => {
      const start = performance.now();
      const tick = (now) => {
        const p = Math.min(1, (now - start) / duration);
        setN(Math.round(target * (1 - Math.pow(1 - p, 3))));
        if (p < 1) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    }, delay);
    return () => { clearTimeout(t); if (raf) cancelAnimationFrame(raf); };
  }, [target, duration, delay]);
  return n;
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => resolve(reader.result); // "data:<mime>;base64,<data>"
    reader.readAsDataURL(blob);
  });
}

  ] : [];
  const grades = ['S', 'A', 'B', 'C', 'F'];

  const [carouselIdx, setCarouselIdx] = React.useState(0);
  const touchStartX = React.useRef(null);

  // ── 옷장 저장 관련 state ──
  const isOotdMode = _lastEvalImages.length > 0 && !_lastAvatarMapping;
  const [showSaveSheet, setShowSaveSheet] = React.useState(false);
  const [savedToast,    setSavedToast]    = React.useState(null); // number | null
  const [showTooltip,   setShowTooltip]   = React.useState(() => {
    try { return !localStorage.getItem('pp_wardrobe_tip_shown'); }
    catch(_) { return false; }
  });
  // 툴팁 3초 후 자동 사라짐 + localStorage 기록
  React.useEffect(() => {
    if (!showTooltip || !isOotdMode) return;
    try { localStorage.setItem('pp_wardrobe_tip_shown', '1'); } catch(_) {}
    const t = setTimeout(() => setShowTooltip(false), 3000);
    return () => clearTimeout(t);
  }, [showTooltip, isOotdMode]);
  // 토스트 3초 후 자동 사라짐
  React.useEffect(() => {
    if (savedToast === null) return;
    const t = setTimeout(() => setSavedToast(null), 3000);
    return () => clearTimeout(t);
  }, [savedToast]);
  const imgCount = _lastEvalImages.length;
  const carouselPrev = () => setCarouselIdx(i => (i - 1 + imgCount) % imgCount);
  const carouselNext = () => setCarouselIdx(i => (i + 1) % imgCount);
  const onTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const diff = touchStartX.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) diff > 0 ? carouselNext() : carouselPrev();
    touchStartX.current = null;
  };

  if (!evalData) {
    return (
      <div style={{ width: '100%', height: '100%', background: '#1A1A1A', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>

          평가 받으러 가기
        </button>
      </div>
    );

function Avatar({ name, size = 46, ring = false }) {
  const hues = [210, 340, 160, 40, 280, 20, 190];
  const h = hues[(name.charCodeAt(0) + (name.charCodeAt(1) || 0)) % hues.length];
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', padding: ring ? 2 : 0, background: ring ? '#3DFFA6' : 'transparent', flexShrink: 0 }}>
      <div style={{ width: '100%', height: '100%', borderRadius: '50%', background: `hsl(${h}, 55%, 83%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: '"JetBrains Mono", monospace', fontSize: size * 0.34, fontWeight: 700, color: `hsl(${h}, 55%, 28%)`, border: ring ? '2px solid #fff' : '1px solid rgba(0,0,0,0.08)' }}>
        {name[0]}
      </div>
    </div>
  );
}

function OOTDPlaceholder({ seed, tall = false }) {
  const hues = [[200, 320], [340, 40], [160, 210], [20, 280], [280, 60]];
  const [h1, h2] = hues[seed % hues.length];
  return (
    <div style={{ width: '100%', aspectRatio: tall ? '4 / 5' : '1 / 1', borderRadius: 14, position: 'relative', overflow: 'hidden', background: `hsl(${h1}, 50%, 88%)` }}>
      <div style={{ position: 'absolute', bottom: 10, left: 10, padding: '3px 7px', background: 'rgba(255,255,255,0.85)', borderRadius: 4, fontFamily: '"JetBrains Mono", monospace', fontSize: 9, letterSpacing: 1, color: '#1A1A1A' }}>OOTD_{String(seed + 1).padStart(2, '0')}</div>
    </div>
  );
}

function ScoreBadge({ score }) {
  const tier = score >= 80 ? '#3DFFA6' : score >= 50 ? '#FFB83D' : '#FF6EAF';
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '5px 10px 5px 7px', background: '#1A1A1A', borderRadius: 999, border: `1.5px solid ${tier}`, boxShadow: `0 0 10px ${tier}55` }}>
      <div style={{ width: 16, height: 16, borderRadius: '50%', background: tier, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: '"Press Start 2P", monospace', fontSize: 6, color: '#1A1A1A' }}>AI</div>
      <span style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 10, color: tier, textShadow: `0 0 6px ${tier}88` }}>{score}</span>
    </div>
  );
}

function LevelChip({ title, lv }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '2px 7px', background: '#fff', border: '1px solid #3DFFA6', borderRadius: 4, fontFamily: '"Space Grotesk", sans-serif', fontSize: 10, fontWeight: 600, color: '#0a6b3e', boxShadow: '0 1px 0 rgba(61,255,166,0.3)', whiteSpace: 'nowrap' }}>
      <span style={{ fontSize: 8 }}>✦</span>{title}<span style={{ color: '#1A1A1A' }}>·lv.{lv}</span>
    </span>
  );
}

function FeedCard({ post, onCardClick }) {
  const [liked, setLiked] = useState(post.liked);
  const [likes, setLikes] = useState(post.likes);
  const [pop, setPop] = useState(false);

  const tap = (e) => {
    e.stopPropagation();
    const next = !liked;
    setLiked(next); setLikes(l => l + (next ? 1 : -1));
    if (next) { setPop(true); setTimeout(() => setPop(false), 520); }
  };

  return (
    <div style={{ background: '#fff', borderRadius: 18, border: '1px solid rgba(0,0,0,0.06)', boxShadow: '0 1px 0 rgba(0,0,0,0.02), 0 6px 16px rgba(0,0,0,0.04)', padding: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
      {/* header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <Avatar name={post.user} size={38}/>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 14, fontWeight: 700, color: '#1A1A1A', display: 'flex', alignItems: 'center', gap: 4 }}>
            {post.user}{post.verified && <span style={{ color: '#3DFFA6', fontSize: 12 }}>✓</span>}
          </div>
          <div style={{ marginTop: 2 }}><LevelChip title={post.tier} lv={post.lv}/></div>
        </div>
        <button onClick={e => e.stopPropagation()} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: '#9a9a9a', fontSize: 18, lineHeight: 1 }}>⋯</button>
      </div>

      {/* image — click navigates to detail */}
      <div onClick={onCardClick} style={{ position: 'relative', cursor: 'pointer' }}>
        <OOTDPlaceholder seed={post.seed} tall/>
        <div style={{ position: 'absolute', top: 10, right: 10 }}><ScoreBadge score={post.score}/></div>
        {post.score >= 80 && <MiniSpark color="#3DFFA6" size={12} style={{ top: 6, right: -2 }}/>}
        {/* tap hint */}
        <div style={{ position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)', padding: '3px 10px', background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(4px)', borderRadius: 999, fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: 'rgba(255,255,255,0.85)', whiteSpace: 'nowrap' }}>
          탭하여 상세보기 →
        </div>
      </div>

      {/* actions */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 16, paddingTop: 2 }}>
        <button onClick={tap} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex', alignItems: 'center', gap: 5, fontFamily: '"Space Grotesk", sans-serif', fontSize: 13, fontWeight: 600, color: '#1A1A1A', position: 'relative' }}>
          <span style={{ display: 'inline-flex', transform: pop ? 'scale(1.35)' : 'scale(1)', transition: 'transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 15.5s-5.5-3.5-5.5-8A3.5 3.5 0 019 4.5 3.5 3.5 0 0114.5 7.5c0 4.5-5.5 8-5.5 8z" fill={liked ? '#FF6EAF' : 'none'} stroke={liked ? '#FF6EAF' : '#1A1A1A'} strokeWidth="1.5" strokeLinejoin="round"/>
            </svg>
          </span>
          {pop && [-30, 0, 30, 60].map((deg, i) => (
            <span key={i} style={{ position: 'absolute', left: 9, top: 9, width: 3, height: 3, background: '#FF6EAF', borderRadius: '50%', animation: 'ppHeartBurst 0.5s ease-out forwards', transform: `rotate(${deg + 45}deg) translateY(0)`, transformOrigin: 'center' }}/>
          ))}
          <span style={{ fontVariantNumeric: 'tabular-nums' }}>{likes}</span>
        </button>
        <button onClick={e => e.stopPropagation()} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex', alignItems: 'center', gap: 5, fontFamily: '"Space Grotesk", sans-serif', fontSize: 13, fontWeight: 600, color: '#1A1A1A' }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 4.5a2 2 0 012-2h8a2 2 0 012 2v6a2 2 0 01-2 2H9l-3.5 3V12.5H5a2 2 0 01-2-2v-6z" stroke="#1A1A1A" strokeWidth="1.5" strokeLinejoin="round"/></svg>
          <span style={{ fontVariantNumeric: 'tabular-nums' }}>{post.comments}</span>
        </button>
        <div style={{ flex: 1 }}/>
        <button onClick={e => e.stopPropagation()} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 2v14l5-3 5 3V2H4z" stroke="#1A1A1A" strokeWidth="1.5" strokeLinejoin="round"/></svg>
        </button>
      </div>

      <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 13, lineHeight: 1.4, color: '#1A1A1A' }}>
        <span style={{ fontWeight: 700 }}>{post.user}</span>{' '}<span>{post.caption}</span>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: -4 }}>
        {post.tags.map(t => <span key={t} style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 12, fontWeight: 600, color: '#0a6b3e', padding: '3px 8px', background: '#E8FFF2', border: '1px solid rgba(61,255,166,0.5)', borderRadius: 999 }}>#{t}</span>)}
      </div>
    </div>
  );
}

function PaepyeongFeed() {

function parseProductName(fullName) {
  // "브랜드명(ENGLISH) 상품명 - 사이즈 & 후기 | 무신사" 형태에서 파싱
  const parenEnd = fullName.indexOf(')');
  if (parenEnd === -1) return { brand: fullName, product: '' };
  const brand = fullName.slice(0, parenEnd + 1).trim();
  const rest = fullName.slice(parenEnd + 1).trim();
  const product = rest.replace(/\s*-\s*사이즈.*$/, '').trim();
  return { brand, product };
}

function MiniCalendar() {
  const { year, month, outfits } = CALENDAR_DATA;
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const today = 21;
  const [selectedDay, setSelectedDay] = useState(null);

  const gradeColor = { S: '#3DFFA6', A: '#FFD166', B: '#FF6EAF', C: '#aaa' };
  const weekdays = ['일','월','화','수','목','금','토'];

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const look = selectedDay ? CALENDAR_LOOKS[selectedDay] : null;

  const handleDayClick = (d) => {
    if (!outfits[d]) return;
    setSelectedDay(prev => prev === d ? null : d);
  };

  return (
    <div style={{
      background: 'rgba(255,255,255,0.04)', borderRadius: 16,
      border: '1px solid rgba(255,255,255,0.08)', overflow: 'hidden',
    }}>
      <div style={{ padding: '14px 16px' }}>
        {/* header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <span style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 9, color: '#3DFFA6' }}>
            {year}.{String(month).padStart(2,'0')}
          </span>
          <span style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: 'rgba(255,255,255,0.35)' }}>
            코디 기록 {Object.keys(outfits).length}일
          </span>
        </div>
        {/* weekday headers */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2, marginBottom: 4 }}>
          {weekdays.map(w => (
            <div key={w} style={{ textAlign: 'center', fontFamily: '"Space Grotesk", sans-serif', fontSize: 9,
              color: w === '일' ? '#FF6EAF' : w === '토' ? '#3DFFA6' : 'rgba(255,255,255,0.3)' }}>
              {w}
            </div>
          ))}
        </div>
        {/* day cells */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3 }}>
          {cells.map((d, i) => {
            if (!d) return <div key={`e${i}`}/>;
            const grade = outfits[d];
            const isToday = d === today;
            const isSelected = d === selectedDay;
            const hasLook = !!CALENDAR_LOOKS[d];
            return (
              <div key={d}
                onClick={() => handleDayClick(d)}
                style={{
                  aspectRatio: '1', borderRadius: 7, display: 'flex', flexDirection: 'column',
                  alignItems: 'center', justifyContent: 'center', gap: 1,
                  background: isSelected ? 'rgba(61,255,166,0.22)' : isToday ? 'rgba(61,255,166,0.12)' : grade ? 'rgba(255,255,255,0.04)' : 'transparent',
                  border: isSelected ? '1.5px solid #3DFFA6' : isToday ? '1px solid rgba(61,255,166,0.35)' : '1px solid transparent',
                  cursor: hasLook ? 'pointer' : 'default',
                  transition: 'all 0.15s',
                  boxShadow: isSelected ? '0 0 10px rgba(61,255,166,0.3)' : 'none',
                }}>
                <span style={{
                  fontFamily: '"Space Grotesk", sans-serif', fontSize: 10, lineHeight: 1,
                  color: isSelected ? '#3DFFA6' : isToday ? '#3DFFA6' : 'rgba(255,255,255,0.6)',
                  fontWeight: isSelected || isToday ? 700 : 400,
                }}>{d}</span>
                {grade && (
                  <span style={{
                    fontFamily: '"Press Start 2P", monospace', fontSize: 6, lineHeight: 1,
                    color: isSelected ? gradeColor[grade] : gradeColor[grade], opacity: isSelected ? 1 : 0.8,
                  }}>{grade}</span>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* 인라인 OOTD 확장 패널 */}
      {look && (
        <div style={{
          borderTop: '1px solid rgba(61,255,166,0.2)',
          background: 'rgba(61,255,166,0.07)',
          padding: '14px 16px 16px',
          animation: 'ppSlideIn 0.22s ease',
        }}>
          {/* panel header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
            <div style={{
              width: 36, height: 36, borderRadius: 10,
              background: gradeColor[look.grade],
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: '"Press Start 2P", monospace', fontSize: 14, color: look.grade === 'B' ? '#fff' : '#0a2a18',
              boxShadow: `0 0 12px ${gradeColor[look.grade]}55`,
              flexShrink: 0,
            }}>{look.grade}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 12, fontWeight: 700, color: '#fff', marginBottom: 2 }}>
                {look.caption}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 8, color: gradeColor[look.grade] }}>
                  {look.score}pt
                </span>
                <span style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 10, color: 'rgba(255,255,255,0.35)' }}>
                  2026.04.{String(selectedDay).padStart(2,'0')}
                </span>
              </div>
            </div>
            <button onClick={() => setSelectedDay(null)}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.3)', fontSize: 18, lineHeight: 1, padding: 4 }}>
              ×
            </button>
          </div>
          {/* outfit preview + items scroll */}
          <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
            {/* mini outfit thumbnail */}
            <div style={{ flexShrink: 0, width: 64, height: 80, borderRadius: 12, overflow: 'hidden' }}>
              <OOTDPlaceholder seed={look.seed} tall/>
            </div>
            {/* items horizontal scroll */}
            <div style={{ flex: 1, overflowX: 'auto', scrollbarWidth: 'none' }}>
              <div style={{ display: 'flex', gap: 8 }}>
                {look.items.map((item, i) => (
                  <div key={i} style={{ flexShrink: 0, width: 60 }}>
                    <div style={{ height: 60, borderRadius: 10, background: item.hue, marginBottom: 5, border: '1px solid rgba(255,255,255,0.1)' }}/>
                    <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 7, color: 'rgba(255,255,255,0.35)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {item.brand}
                    </div>
                    <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 8, color: 'rgba(255,255,255,0.6)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', marginTop: 1 }}>
                      {item.name}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function WardrobeItemDetailPopup({ item, onClose, onSave }) {

  const [editName,  setEditName]  = useState(item.name  || '');
  const [editPrice, setEditPrice] = useState(item.price != null ? String(item.price) : '');
  const [imgError,  setImgError]  = useState(false);

  const priceDisplay = item.price != null
    ? Number(item.price).toLocaleString() + '원'
    : '-';

  const handleSave = () => {
    const priceNum = editPrice.trim() === ''
      ? null
      : parseInt(editPrice.replace(/[^0-9]/g, ''), 10) || null;
    onSave(item.id, { brand: editBrand.trim(), name: editName.trim(), price: priceNum });
    setEditing(false);

            background: '#111', borderTop: '1px solid rgba(255,255,255,0.07)',
          }}>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setEditing(false)} style={{
                flex: 1, height: 50, borderRadius: 999,
                background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.14)',
                fontFamily: '"Space Grotesk",sans-serif', fontSize: 14, fontWeight: 700,
                color: 'rgba(255,255,255,0.5)', cursor: 'pointer',
              }}>취소</button>
              <button onClick={handleSave} style={{
                flex: 2, height: 50, borderRadius: 999,
                background: '#3DFFA6', border: 'none',
                fontFamily: '"Space Grotesk",sans-serif', fontSize: 14, fontWeight: 700,
                color: '#0a2a18', cursor: 'pointer',
                boxShadow: '0 0 20px rgba(61,255,166,0.45)',
              }}>저장하기</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PersonalShowroom() {
  const [tab, setTab] = useState('쇼룸');
  const [wardrobeCat, setWardrobeCat] = useState('전체');
  const [detailItem, setDetailItem] = useState(null);   // 상세 팝업 아이템
  const [itemEdits, setItemEdits]   = useState({});     // { [id]: { brand, name, price } }
  const tabs = ['쇼룸', '옷장', '콜렉션'];
  const wardrobeCats = ['전체', '상의', '아우터', '바지', '원피스·스커트', '신발', '가방', '소품'];
  const wardrobeCatAlias = { '원피스·스커트': '원피스/스커트' };

  // 편집 사항이 반영된 아이템 반환
  const getItem = (item) => ({ ...item, ...(itemEdits[item.id] || {}) });

  const allPersonalItems = [...dummyProducts, ..._userWardrobeAdditions];
  const filtered = wardrobeCat === '전체'
    ? allPersonalItems
    : allPersonalItems.filter(i => i.category === (wardrobeCatAlias[wardrobeCat] || wardrobeCat));

  const handleSaveEdit = (id, edits) => {
    setItemEdits(prev => ({ ...prev, [id]: { ...(prev[id] || {}), ...edits } }));
    setDetailItem(prev => prev ? { ...prev, ...edits } : null);
  };

  return (
    <div style={{
      position: 'absolute', inset: 0, background: '#0d0d0d',
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      {/* Y2K bg glows */}


      {/* profile header */}
      <div style={{
        position: 'relative', zIndex: 1,
        padding: '48px 20px 0', flexShrink: 0,
        background: '#0d1f17',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 14 }}>
          {/* avatar with gradient ring */}
          <div style={{ position: 'relative', flexShrink: 0 }}>
            <div style={{
              width: 64, height: 64, borderRadius: '50%', padding: 2,
              background: '#3DFFA6',
            }}>
              <div style={{
                width: '100%', height: '100%', borderRadius: '50%',
                background: '#3DFFA6',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: '"Press Start 2P", monospace', fontSize: 18, color: '#0a2a18',
              }}>K</div>
            </div>
            <div style={{ position: 'absolute', inset: -2, borderRadius: '50%', boxShadow: '0 0 22px rgba(61,255,166,0.45)', pointerEvents: 'none' }}/>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 12, color: '#fff', marginBottom: 4 }}>
              @kate.style
            </div>
            <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 12, color: 'rgba(255,255,255,0.45)' }}>
              미니멀 · 젠더리스 · 로우클래식 애호가
            </div>
          </div>
          <button onClick={() => {}}
            style={{
              padding: '7px 14px', borderRadius: 999,
              border: '1px solid rgba(61,255,166,0.3)',
              background: 'rgba(61,255,166,0.07)',
              fontFamily: '"Space Grotesk", sans-serif', fontSize: 12, fontWeight: 600,
              color: '#3DFFA6', cursor: 'pointer',
            }}>편집</button>
        </div>
        {/* stats row — bordered card */}
        <div style={{
          display: 'flex', gap: 0, marginBottom: 16,
          borderRadius: 14, border: '1px solid rgba(255,255,255,0.08)',
          background: 'rgba(255,255,255,0.03)',
          overflow: 'hidden',
        }}>
          {[['코디 기록', '47'], ['평균 등급', 'A+'], ['팔로워', '234']].map(([label, val], i, arr) => (
            <div key={label} style={{
              flex: 1, textAlign: 'center', padding: '12px 0',
              borderRight: i < arr.length - 1 ? '1px solid rgba(255,255,255,0.08)' : 'none',
            }}>
              <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 13, color: '#3DFFA6', marginBottom: 4 }}>{val}</div>
              <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 10, color: 'rgba(255,255,255,0.35)' }}>{label}</div>
            </div>
          ))}
        </div>
        {/* tabs */}
        <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
          {tabs.map(t => (
            <button key={t} onClick={() => setTab(t)}
              style={{
                flex: 1, height: 40, border: 'none', cursor: 'pointer', background: 'none',
                fontFamily: '"Space Grotesk", sans-serif', fontSize: 13, fontWeight: 700,
                color: tab === t ? '#3DFFA6' : 'rgba(255,255,255,0.35)',
                borderBottom: tab === t ? '2px solid #3DFFA6' : '2px solid transparent',
                boxShadow: tab === t ? '0 2px 10px rgba(61,255,166,0.35)' : 'none',
                marginBottom: -1, transition: 'all 0.18s',
              }}>{t}</button>
          ))}
        </div>
      </div>

      {/* tab content */}
      <div style={{ position: 'relative', zIndex: 1, flex: 1, overflowY: 'auto', scrollbarWidth: 'none', paddingBottom: 68 }}>
        {tab === '쇼룸' && (
          <div style={{ padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 16 }}>
            {/* recent grade */}
            <div style={{
              padding: '14px 16px', borderRadius: 14,
              background: 'rgba(61,255,166,0.07)', border: '1px solid rgba(61,255,166,0.2)',
              display: 'flex', alignItems: 'center', gap: 14,
            }}>
              <div style={{
                width: 48, height: 48, borderRadius: 12,
                background: '#3DFFA6',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: '"Press Start 2P", monospace', fontSize: 20, color: '#0a2a18',
              }}>S</div>
              <div>
                <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 3 }}>
                  오늘의 평가 · 2026.04.21
                </div>
                <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 10, color: '#fff' }}>
                  S등급 · 94점
                </div>
                <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: '#3DFFA6', marginTop: 2 }}>
                  상위 3% · 미니멀 페미닌 완성
                </div>
              </div>
            </div>
            {/* NEXT TIER progress bar */}
            <div style={{
              padding: '14px 16px', borderRadius: 14,
              background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.08)',
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                <span style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 8, color: 'rgba(255,255,255,0.5)', letterSpacing: 0.5 }}>NEXT TIER</span>
                <span style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: '#3DFFA6', fontWeight: 700 }}>3회 더 → 패피 Lv.2</span>
              </div>
              <div style={{ height: 8, borderRadius: 999, background: 'rgba(255,255,255,0.07)', overflow: 'hidden', position: 'relative' }}>
                <div style={{
                  position: 'absolute', top: 0, left: 0, height: '100%', width: '68%',
                  borderRadius: 999,
                  background: '#3DFFA6',
                }}/>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 5 }}>
                <span style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 9, color: 'rgba(255,255,255,0.25)' }}>패피 Lv.1</span>
                <span style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 9, color: 'rgba(255,255,255,0.25)' }}>68%</span>
              </div>
            </div>
            {/* calendar */}
            <MiniCalendar/>
            {/* recent items */}
            <div>
              <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 9, color: 'rgba(255,255,255,0.4)', marginBottom: 10 }}>
                최근 착용 아이템
              </div>
              <div style={{ display: 'flex', gap: 8, overflowX: 'auto', scrollbarWidth: 'none' }}>
                {dummyProducts.slice(0, 5).map(item => (
                  <div key={item.id} style={{
                    flexShrink: 0, width: 70, borderRadius: 10, overflow: 'hidden',
                    border: '1px solid rgba(255,255,255,0.08)',
                  }}>
                    <div style={{ height: 80, background: '#f5f5f5', position: 'relative', overflow: 'hidden' }}>
                      <img src={item.imageUrl} alt={item.name}
                        style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
                        onError={e => { e.target.style.display='none'; e.target.parentNode.style.background='#ececec'; }}
                      />
                    </div>
                    <div style={{ padding: '5px 5px 6px', background: 'rgba(255,255,255,0.03)' }}>
                      <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 7, color: 'rgba(255,255,255,0.35)',
                        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                        {item.brand}
                      </div>
                      <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 8, color: 'rgba(255,255,255,0.6)',
                        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', marginTop: 1 }}>
                        {item.category}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === '옷장' && (
          <div style={{ padding: '14px 20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 2 }}>
              <span style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: 'rgba(255,255,255,0.35)' }}>
                총 {allPersonalItems.length}개 아이템
              </span>
              <button style={{ background: 'rgba(61,255,166,0.1)', border: '1px solid rgba(61,255,166,0.3)', borderRadius: 999,
                padding: '5px 12px', fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, fontWeight: 700,
                color: '#3DFFA6', cursor: 'pointer' }}>
                + 추가
              </button>
            </div>
            <CategoryStrip cats={wardrobeCats} active={wardrobeCat} onSelect={setWardrobeCat} dark={true}/>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginTop: 4 }}>
              {filtered.map(item => (
                <ProductCard key={item.id} item={getItem(item)} selected={false}
                  onToggle={() => setDetailItem(getItem(item))}/>
              ))}
            </div>
          </div>
        )}

        {tab === '콜렉션' && (
          <div style={{ padding: '14px 20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 2 }}>
              <span style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: 'rgba(255,255,255,0.35)' }}>
                {COLLECTION_CARDS.length}개 콜렉션
              </span>
              <button style={{ background: 'rgba(61,255,166,0.1)', border: '1px solid rgba(61,255,166,0.3)', borderRadius: 999,
                padding: '5px 12px', fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, fontWeight: 700,
                color: '#3DFFA6', cursor: 'pointer' }}>
                + 새 콜렉션
              </button>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
              {COLLECTION_CARDS.map((card, i) => <CollectionCard key={i} card={card}/>)}
            </div>
            {/* empty collection placeholder */}
            <div style={{
              marginTop: 4, padding: '28px 0', borderRadius: 14,
              border: '2px dashed rgba(255,255,255,0.08)',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
              cursor: 'pointer',
            }}>
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <path d="M14 5v18M5 14h18" stroke="rgba(255,255,255,0.2)" strokeWidth="2" strokeLinecap="round"/>
              </svg>
              <span style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 12, color: 'rgba(255,255,255,0.2)' }}>
                새 콜렉션 만들기
              </span>
            </div>
          </div>
        )}
      </div>

      <SharedBottomNav/>

      {/* 옷장 아이템 상세 팝업 */}
      {detailItem && (
        <WardrobeItemDetailPopup
          item={detailItem}
          onClose={() => setDetailItem(null)}
          onSave={handleSaveEdit}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP — ROUTER + DEVICE WRAPPER
// ═══════════════════════════════════════════════════════════════

function DeviceWrapper() {
  return (
    <div style={{ width: '100%', minHeight: '100vh', position: 'relative', overflow: 'hidden' }}>
      <Switch>
        <Route exact path="/"           component={PaepyeongOnboarding}/>
        <Route       path="/result"     component={PaepyeongResult}/>
        <Route       path="/feed"       component={PublicShowroom}/>
        <Route       path="/detail"     component={PaepyeongDetail}/>
        <Route       path="/paepyeong"  component={PaepyeongHub}/>
        <Route       path="/personal"   component={PersonalShowroom}/>
      </Switch>
    </div>
  );
}

function App() {
  return (
    <HashRouter>
      <DeviceWrapper/>
    </HashRouter>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
