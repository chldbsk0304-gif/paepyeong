<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { HashRouter, Switch, Route, useHistory, useLocation } = ReactRouterDOM;

// ═══════════════════════════════════════════════════════════════
// CLAUDE API KEY — localStorage에 저장 (코드에 하드코딩 금지)
// ═══════════════════════════════════════════════════════════════
const getApiKey = () => localStorage.getItem('pp_claude_api_key') || '';
const setApiKey = (key) => localStorage.setItem('pp_claude_api_key', key.trim());

// HashRouter는 history.push(path, state) state 전달 미지원 → 전역 변수로 우회
let _lastEvalResult = null;
let _lastEvalImages = []; // 결과 화면에 표시할 업로드 이미지 previewUrl 목록

async function evaluateWithClaude(type, data) {
  const systemPrompt = `당신은 패션 평가 AI입니다. 유저가 업로드한 코디 이미지를 분석하고, 아래 기준에 따라 평가하세요. 다른 텍스트 없이 JSON만 출력하세요.

## 점수 평가 기준 (총 100점)
- 스타일 완성도 (30점): 의도한 스타일 방향에 맞게 코디했는가 / 스타일 파괴 요소가 없는가
- 아이템 매칭 (25점): 소재·핏·무드의 아이템 간 일관성 / 상하의 밸런스
- 색조합 (25점): 색상 수 적절성(기본 3색 이내) / 색 조합 패턴의 조화
- 핏/실루엣 (20점): 아이템이 의도에 맞게 착용되었는가 / 전체 실루엣 균형

## 채점 원칙
- "무난함"은 70% 이하로 처리. 진짜 잘한 것만 높은 점수
- 아이템이 비싸거나 브랜드가 있어도 조화가 없으면 감점
- 보이지 않는 아이템(신발, 가방 등)은 "미확인"으로 처리하되 감점 요소로 언급
- 이미지가 불명확하거나 전신이 안 보이면 확인 가능한 부분만 평가

## 등급: S(90-100점), A(75-89점), B(60-74점), C(45-59점), F(0-44점)

## 네이밍 규칙 (naming 필드)
- 반드시 다음 구조 중 하나: 명사+명사 / 형용사+명사 / 동사+명사
- 예시: "용팔이 상경룩 😂", "아슬아슬 도전룩 😬", "튀려다 묻힌 룩 😅"
- 한국인이 듣자마자 그림이 그려지는 레퍼런스 사용, 이모지 1개 필수
- 평범한 패션 용어 금지 ("캐주얼룩", "스트릿룩" 불가)

## 킹받는 첫 줄 말투 (oneLiner 필드) — 등급별 필수 적용, 반드시 50자 이내
S: 순수 칭찬, 비꼬기 없이 쿨하게 (예: "오 이거 진짜 잘 입었는데")
A: 유아 퇴행 — 힝, 넘무, 졸료, ~하당, ㅠㅠ 사용 (예: "거의 다 좋은데 딱 한 개가 아쉬워서 너무 속상하당 ㅠㅠ")
B: 꽈배기 비꼬기 — "내가 알았다~", "그럴 줄 알았지 ㅋㅋ" 식 (예: "내가 이 바지랑 이 상의 같이 입으면 어떻게 될지 알았다~ ㅋㅋ")
C: 자기방어 — "어짜라고", "내가 일부러 그랬냐" 식 (예: "색도 이상하고 핏도 이상하고, 어짜라고, 내가 일부러 이러냐?")
F: 3가지 풀콤보 — 유아퇴행+꽈배기비꼬기+자기방어 (예: "스타일도 엉망이고 색도 엉망이고, 내가 너 이럴 줄 알았다~ ㅋㅋ 어짜라고, 힝 너무 속상하당 ㅠㅠ")
ㅠㅠ, ㅋㅋ 외 이모지 추가 금지. 옷에만 집중, 인격 공격 절대 금지.

## 상세 설명 (summary 필드)
- 친절한 존댓말, 잘된 점 먼저 → 개선점 순서
- 핵심 문제 1~2가지만. 전문 용어 금지 ("위아래가 따로 노는 느낌", "색이 너무 싸우고 있어요" 식으로)

## 핵심 넛지 (nudge 필드)
- 현재 등급에서 한 단계 올라가기 위한 행동 1가지
- 포맷: "한 가지만 바꾼다면: [구체적 조언]"

반드시 아래 JSON 형식으로만 응답:
{"totalScore":숫자,"grade":"S/A/B/C/F","naming":"네이밍+이모지","oneLiner":"킹받는첫줄","summary":"상세설명","nudge":"핵심넛지","scores":{"styleCompleteness":숫자0-30,"itemMatching":숫자0-25,"colorCombination":숫자0-25,"fitSilhouette":숫자0-20}}`;

  let messages;
  if (type === 'ootd') {
    messages = [{ role: 'user', content: [
      { type: 'image', source: { type: 'base64', media_type: data.mediaType, data: data.base64 } },
      { type: 'text', text: '이 OOTD 사진을 패션 전문가로서 평가해주세요.' },
    ]}];
  } else if (type === 'ootd_multi') {
    messages = [{ role: 'user', content: [
      ...data.map(img => ({ type: 'image', source: { type: 'base64', media_type: img.mediaType, data: img.base64 } })),
      { type: 'text', text: `이 ${data.length}장의 OOTD 사진들을 종합적으로 평가해주세요.` },
    ]}];
  } else {
    messages = [{ role: 'user', content: `다음 아이템들로 구성된 코디를 평가해주세요:\n\n${data}` }];
  }

  const apiKey = getApiKey();
  if (!apiKey) throw new Error('API 키가 설정되지 않았습니다. 설정(⚙) 버튼을 눌러 키를 입력해주세요.');

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': getApiKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1024, system: systemPrompt, messages }),
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`API 오류 (${resp.status}): ${errText}`);
  }
  const json = await resp.json();
  const text = json.content[0].text;
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('응답 파싱 실패');
  return JSON.parse(match[0]);
}

function UploadSlot({ index, imageData, onFileSelect, big = false }) {
  const fileRef = useRef(null);
  const filled = !!imageData;

  const handleChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      onFileSelect({ base64: dataUrl.split(',')[1], mediaType: file.type || 'image/jpeg', previewUrl: dataUrl });
    };
    reader.readAsDataURL(file);
  };

  return (
    <button onClick={() => fileRef.current && fileRef.current.click()} style={{ position: 'relative', width: '100%', aspectRatio: big ? '2 / 1' : '1 / 1', border: 'none', padding: 0, background: 'transparent', cursor: 'pointer', outline: 'none' }}>
      <input ref={fileRef} type="file" accept="image/*" onChange={handleChange} style={{ display: 'none' }}/>
      <div style={{ position: 'absolute', inset: 0, borderRadius: 18, padding: 2, background: filled ? 'linear-gradient(135deg, #fff 0%, #3DFFA6 30%, #25d688 50%, #3DFFA6 70%, #fff 100%)' : 'linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(61,255,166,0.35) 50%, rgba(255,255,255,0.2) 100%)' }}>
        <div style={{ width: '100%', height: '100%', borderRadius: 16, background: 'rgba(255,255,255,0.03)', border: filled ? 'none' : '1.5px dashed rgba(61,255,166,0.55)', position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: filled ? 'inset 0 0 30px rgba(61,255,166,0.3), 0 0 20px rgba(61,255,166,0.35)' : 'inset 0 0 20px rgba(61,255,166,0.08)' }}>
          {!filled && <div style={{ position: 'absolute', inset: 6, borderRadius: 12, border: '1px dashed rgba(255,255,255,0.15)' }}/>}
          {filled ? (
            <>
              <img src={imageData.previewUrl} alt={`OOTD ${index + 1}`} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', borderRadius: 16 }}/>
              <div style={{ position: 'absolute', top: 8, right: 8, width: 26, height: 26, borderRadius: '50%', background: 'linear-gradient(135deg, #fff 0%, #3DFFA6 50%, #25d688 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 0 12px rgba(61,255,166,0.8)', zIndex: 1 }}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7L6 10L11 4" stroke="#1A1A1A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
              <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '40%', background: 'linear-gradient(to bottom, rgba(0,0,0,0.3), transparent)', pointerEvents: 'none', borderRadius: '16px 16px 0 0', zIndex: 1 }}/>
            </>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, position: 'relative', zIndex: 2 }}>
              <div style={{ width: 36, height: 36, position: 'relative' }}>

                <div style={{ position: 'absolute', left: '50%', top: 0, bottom: 0, width: 3, transform: 'translateX(-50%)', background: 'linear-gradient(to bottom, transparent, #3DFFA6, transparent)', borderRadius: 3, boxShadow: '0 0 8px #3DFFA6' }}/>
              </div>
              <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 8, color: 'rgba(255,255,255,0.45)', letterSpacing: 1 }}>{String(index + 1).padStart(2, '0')}</div>

  );
}

function PaepyeongOnboarding() {
  const history = useHistory();
  const [slots, setSlots] = useState([null, null, null]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const filledCount = slots.filter(Boolean).length;
  const setSlot = (i, data) => setSlots(s => s.map((v, idx) => idx === i ? data : v));

  const handleContinue = async () => {
    if (filledCount < 3) return;
    setLoading(true);
    setError(null);
    try {
      const images = slots.filter(Boolean);
      const result = await evaluateWithClaude('ootd_multi', images);
      _lastEvalResult = result;
      _lastEvalImages = images.map(img => img.previewUrl);
      history.push('/result');
    } catch (e) {
      setError(e.message || 'API 오류가 발생했습니다');
      setLoading(false);
    }
  };

function useCountUp(target, duration = 1400, delay = 200) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf;
    const t = setTimeout(() => {
      const start = performance.now();
      const tick = (now) => {
        const p = Math.min(1, (now - start) / duration);
        setN(Math.round(target * (1 - Math.pow(1 - p, 3))));
        if (p < 1) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    }, delay);
    return () => { clearTimeout(t); if (raf) cancelAnimationFrame(raf); };
  }, [target, duration, delay]);
  return n;
}

function StatBar({ label, value, max = 10, color, delay = 0 }) {
  const [w, setW] = useState(0);
  const displayValue = useCountUp(value, 900, delay + 300);
  useEffect(() => {
    const t = setTimeout(() => setW((value / max) * 100), delay);
    return () => clearTimeout(t);
  }, [value, max, delay]);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{ width: 70, fontFamily: '"Press Start 2P", monospace', fontSize: 9, letterSpacing: 1, color: 'rgba(255,255,255,0.85)' }}>{label}</div>
      <div style={{ flex: 1, height: 18, position: 'relative', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 4, boxShadow: 'inset 0 2px 4px rgba(0,0,0,0.6)', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', pointerEvents: 'none', zIndex: 3 }}>
          {Array.from({ length: max - 1 }).map((_, i) => <div key={i} style={{ flex: 1, borderRight: '1px dashed rgba(0,0,0,0.5)' }}/>)}
          <div style={{ flex: 1 }}/>
        </div>
        <div style={{ position: 'absolute', top: 0, bottom: 0, left: 0, width: `${w}%`, background: `linear-gradient(180deg, rgba(255,255,255,0.7) 0%, ${color} 30%, ${color} 70%, rgba(0,0,0,0.2) 100%)`, boxShadow: `0 0 10px ${color}cc`, borderRadius: 2, transition: 'width 1.1s cubic-bezier(0.22, 1, 0.36, 1)' }}/>

}

function Avatar({ name, size = 46, ring = false }) {
  const hues = [210, 340, 160, 40, 280, 20, 190];
  const h = hues[(name.charCodeAt(0) + (name.charCodeAt(1) || 0)) % hues.length];
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', padding: ring ? 2 : 0, background: ring ? 'linear-gradient(135deg, #3DFFA6, #25d688, #fff, #3DFFA6)' : 'transparent', flexShrink: 0 }}>
      <div style={{ width: '100%', height: '100%', borderRadius: '50%', background: `repeating-linear-gradient(45deg, hsl(${h}, 55%, 78%) 0px, hsl(${h}, 55%, 78%) 4px, hsl(${h}, 55%, 90%) 4px, hsl(${h}, 55%, 90%) 8px)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: '"JetBrains Mono", monospace', fontSize: size * 0.34, fontWeight: 700, color: `hsl(${h}, 55%, 28%)`, border: ring ? '2px solid #fff' : '1px solid rgba(0,0,0,0.08)' }}>
        {name[0]}
      </div>
    </div>
  );
}

function OOTDPlaceholder({ seed, tall = false }) {
  const hues = [[200, 320], [340, 40], [160, 210], [20, 280], [280, 60]];
  const [h1, h2] = hues[seed % hues.length];
  return (
    <div style={{ width: '100%', aspectRatio: tall ? '4 / 5' : '1 / 1', borderRadius: 14, position: 'relative', overflow: 'hidden', background: `linear-gradient(135deg, hsl(${h1}, 50%, 88%), hsl(${h2}, 45%, 78%))` }}>
      <div style={{ position: 'absolute', inset: 0, background: `repeating-linear-gradient(45deg, rgba(255,255,255,0.2) 0px, rgba(255,255,255,0.2) 3px, transparent 3px, transparent 14px)` }}/>
      <div style={{ position: 'absolute', bottom: 10, left: 10, padding: '3px 7px', background: 'rgba(255,255,255,0.85)', borderRadius: 4, fontFamily: '"JetBrains Mono", monospace', fontSize: 9, letterSpacing: 1, color: '#1A1A1A' }}>OOTD_{String(seed + 1).padStart(2, '0')}</div>
    </div>
  );
}

function ScoreBadge({ score }) {
  const tier = score >= 80 ? '#3DFFA6' : score >= 50 ? '#FFB83D' : '#FF6EAF';
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '5px 10px 5px 7px', background: '#1A1A1A', borderRadius: 999, border: `1.5px solid ${tier}`, boxShadow: `0 0 10px ${tier}55` }}>

      <span style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 10, color: tier, textShadow: `0 0 6px ${tier}88` }}>{score}</span>
    </div>

}

function LevelChip({ title, lv }) {

function FeedCard({ post, onCardClick }) {
  const [liked, setLiked] = useState(post.liked);
  const [likes, setLikes] = useState(post.likes);
  const [pop, setPop] = useState(false);

  const tap = (e) => {
    e.stopPropagation();
    const next = !liked;
    setLiked(next); setLikes(l => l + (next ? 1 : -1));
    if (next) { setPop(true); setTimeout(() => setPop(false), 520); }
  };

  return (
    <div style={{ background: '#fff', borderRadius: 18, border: '1px solid rgba(0,0,0,0.06)', boxShadow: '0 1px 0 rgba(0,0,0,0.02), 0 6px 16px rgba(0,0,0,0.04)', padding: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>

        <Avatar name={post.user} size={38}/>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 14, fontWeight: 700, color: '#1A1A1A', display: 'flex', alignItems: 'center', gap: 4 }}>
            {post.user}{post.verified && <span style={{ color: '#3DFFA6', fontSize: 12 }}>✓</span>}
          </div>
          <div style={{ marginTop: 2 }}><LevelChip title={post.tier} lv={post.lv}/></div>
        </div>
        <button onClick={e => e.stopPropagation()} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: '#9a9a9a', fontSize: 18, lineHeight: 1 }}>⋯</button>
      </div>

      {/* image — click navigates to detail */}
      <div onClick={onCardClick} style={{ position: 'relative', cursor: 'pointer' }}>
        <OOTDPlaceholder seed={post.seed} tall/>
        <div style={{ position: 'absolute', top: 10, right: 10 }}><ScoreBadge score={post.score}/></div>
        {post.score >= 80 && <MiniSpark color="#3DFFA6" size={12} style={{ top: 6, right: -2 }}/>}

        <div style={{ position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)', padding: '3px 10px', background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(4px)', borderRadius: 999, fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: 'rgba(255,255,255,0.85)', whiteSpace: 'nowrap' }}>

      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 16, paddingTop: 2 }}>
        <button onClick={tap} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex', alignItems: 'center', gap: 5, fontFamily: '"Space Grotesk", sans-serif', fontSize: 13, fontWeight: 600, color: '#1A1A1A', position: 'relative' }}>
          <span style={{ display: 'inline-flex', transform: pop ? 'scale(1.35)' : 'scale(1)', transition: 'transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 15.5s-5.5-3.5-5.5-8A3.5 3.5 0 019 4.5 3.5 3.5 0 0114.5 7.5c0 4.5-5.5 8-5.5 8z" fill={liked ? '#FF6EAF' : 'none'} stroke={liked ? '#FF6EAF' : '#1A1A1A'} strokeWidth="1.5" strokeLinejoin="round"/>
            </svg>
          </span>
          {pop && [-30, 0, 30, 60].map((deg, i) => (
            <span key={i} style={{ position: 'absolute', left: 9, top: 9, width: 3, height: 3, background: '#FF6EAF', borderRadius: '50%', animation: 'ppHeartBurst 0.5s ease-out forwards', transform: `rotate(${deg + 45}deg) translateY(0)`, transformOrigin: 'center' }}/>
          ))}
          <span style={{ fontVariantNumeric: 'tabular-nums' }}>{likes}</span>
        </button>
        <button onClick={e => e.stopPropagation()} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex', alignItems: 'center', gap: 5, fontFamily: '"Space Grotesk", sans-serif', fontSize: 13, fontWeight: 600, color: '#1A1A1A' }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 4.5a2 2 0 012-2h8a2 2 0 012 2v6a2 2 0 01-2 2H9l-3.5 3V12.5H5a2 2 0 01-2-2v-6z" stroke="#1A1A1A" strokeWidth="1.5" strokeLinejoin="round"/></svg>
          <span style={{ fontVariantNumeric: 'tabular-nums' }}>{post.comments}</span>
        </button>
        <div style={{ flex: 1 }}/>
        <button onClick={e => e.stopPropagation()} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 2v14l5-3 5 3V2H4z" stroke="#1A1A1A" strokeWidth="1.5" strokeLinejoin="round"/></svg>

    </div>
  );

function parseProductName(fullName) {
  // "브랜드명(ENGLISH) 상품명 - 사이즈 & 후기 | 무신사" 형태에서 파싱
  const parenEnd = fullName.indexOf(')');
  if (parenEnd === -1) return { brand: fullName, product: '' };
  const brand = fullName.slice(0, parenEnd + 1).trim();
  const rest = fullName.slice(parenEnd + 1).trim();
  const product = rest.replace(/\s*-\s*사이즈.*$/, '').trim();
  return { brand, product };
}

function MiniCalendar() {
  const { year, month, outfits } = CALENDAR_DATA;
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const today = 21;
  const [selectedDay, setSelectedDay] = useState(null);

  const gradeColor = { S: '#3DFFA6', A: '#FFD166', B: '#FF6EAF', C: '#aaa' };
  const weekdays = ['일','월','화','수','목','금','토'];

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const look = selectedDay ? CALENDAR_LOOKS[selectedDay] : null;

  const handleDayClick = (d) => {
    if (!outfits[d]) return;
    setSelectedDay(prev => prev === d ? null : d);
  };

  return (
    <div style={{
      background: 'rgba(255,255,255,0.04)', borderRadius: 16,
      border: '1px solid rgba(255,255,255,0.08)', overflow: 'hidden',
    }}>
      <div style={{ padding: '14px 16px' }}>
        {/* header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <span style={{ fontFamily: '"Press Start 2P", monospace', fontSize: 9, color: '#3DFFA6' }}>
            {year}.{String(month).padStart(2,'0')}
          </span>
          <span style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 11, color: 'rgba(255,255,255,0.35)' }}>
            코디 기록 {Object.keys(outfits).length}일
          </span>
        </div>
        {/* weekday headers */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2, marginBottom: 4 }}>
          {weekdays.map(w => (
            <div key={w} style={{ textAlign: 'center', fontFamily: '"Space Grotesk", sans-serif', fontSize: 9,
              color: w === '일' ? '#FF6EAF' : w === '토' ? '#3DFFA6' : 'rgba(255,255,255,0.3)' }}>
              {w}
            </div>
          ))}
        </div>
        {/* day cells */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3 }}>
          {cells.map((d, i) => {
            if (!d) return <div key={`e${i}`}/>;
            const grade = outfits[d];
            const isToday = d === today;
            const isSelected = d === selectedDay;
            const hasLook = !!CALENDAR_LOOKS[d];
            return (
              <div key={d}
                onClick={() => handleDayClick(d)}
                style={{
                  aspectRatio: '1', borderRadius: 7, display: 'flex', flexDirection: 'column',
                  alignItems: 'center', justifyContent: 'center', gap: 1,
                  background: isSelected ? 'rgba(61,255,166,0.22)' : isToday ? 'rgba(61,255,166,0.12)' : grade ? 'rgba(255,255,255,0.04)' : 'transparent',
                  border: isSelected ? '1.5px solid #3DFFA6' : isToday ? '1px solid rgba(61,255,166,0.35)' : '1px solid transparent',
                  cursor: hasLook ? 'pointer' : 'default',
                  transition: 'all 0.15s',
                  boxShadow: isSelected ? '0 0 10px rgba(61,255,166,0.3)' : 'none',
                }}>
                <span style={{
                  fontFamily: '"Space Grotesk", sans-serif', fontSize: 10, lineHeight: 1,
                  color: isSelected ? '#3DFFA6' : isToday ? '#3DFFA6' : 'rgba(255,255,255,0.6)',
                  fontWeight: isSelected || isToday ? 700 : 400,
                }}>{d}</span>
                {grade && (
                  <span style={{
                    fontFamily: '"Press Start 2P", monospace', fontSize: 6, lineHeight: 1,
                    color: isSelected ? gradeColor[grade] : gradeColor[grade], opacity: isSelected ? 1 : 0.8,
                  }}>{grade}</span>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* 인라인 OOTD 확장 패널 */}
      {look && (
        <div style={{
          borderTop: '1px solid rgba(61,255,166,0.2)',
          background: 'linear-gradient(180deg, rgba(61,255,166,0.07) 0%, rgba(61,255,166,0.03) 100%)',
          padding: '14px 16px 16px',
          animation: 'ppSlideIn 0.22s ease',
        }}>
          {/* panel header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>

              width: 36, height: 36, borderRadius: 10,
              background: `linear-gradient(135deg, ${gradeColor[look.grade]}, ${look.grade === 'S' ? '#25d688' : look.grade === 'A' ? '#e6b800' : '#e03d8a'})`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: '"Press Start 2P", monospace', fontSize: 14, color: look.grade === 'B' ? '#fff' : '#0a2a18',
              boxShadow: `0 0 12px ${gradeColor[look.grade]}55`,
              flexShrink: 0,

            <div style={{ flex: 1, overflowX: 'auto', scrollbarWidth: 'none' }}>
              <div style={{ display: 'flex', gap: 8 }}>
                {look.items.map((item, i) => (
                  <div key={i} style={{ flexShrink: 0, width: 60 }}>
                    <div style={{ height: 60, borderRadius: 10, background: item.hue, marginBottom: 5, border: '1px solid rgba(255,255,255,0.1)' }}/>
                    <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 7, color: 'rgba(255,255,255,0.35)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {item.brand}
                    </div>
                    <div style={{ fontFamily: '"Space Grotesk", sans-serif', fontSize: 8, color: 'rgba(255,255,255,0.6)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', marginTop: 1 }}>
                      {item.name}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
              {COLLECTION_CARDS.map((card, i) => <CollectionCard key={i} card={card}/>)}

// ═══════════════════════════════════════════════════════════════
// APP — ROUTER + DEVICE WRAPPER
// ═══════════════════════════════════════════════════════════════

function DeviceWrapper() {
  const location = useLocation();
  const lightPaths = ['/feed', '/detail'];
  const isDark = !lightPaths.includes(location.pathname);

  return (
    <IOSDevice dark={isDark}>
      <Switch>
        <Route exact path="/"           component={PaepyeongOnboarding}/>
        <Route       path="/result"     component={PaepyeongResult}/>
        <Route       path="/feed"       component={PublicShowroom}/>
        <Route       path="/detail"     component={PaepyeongDetail}/>
        <Route       path="/paepyeong"  component={PaepyeongHub}/>
        <Route       path="/personal"   component={PersonalShowroom}/>
      </Switch>
    </IOSDevice>
  );
}

function RouteLabel() {
  const location = useLocation();
  const labels = {
    '/':          '01 Onboarding · OOTD Upload',
    '/result':    '02 Result · Score / Grade',
    '/feed':      '03 퍼블릭쇼룸 · Public Showroom',
    '/detail':    '04 Detail · A/B 코디 투표',
    '/paepyeong': '05 패평 Hub · AI 평가',
    '/personal':  '06 퍼스널쇼룸 · Personal Showroom',
  };
  return (
    <div className="pp-caption">★ {labels[location.pathname] || '패평'} ★</div>
  );
}

function App() {
  return (
    <HashRouter>
      <RouteLabel/>
      <DeviceWrapper/>
    </HashRouter>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
