<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 패션 판독기</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: #FDF0FF;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,110,180,0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(155,89,182,0.15) 0%, transparent 40%);
  }

  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }

  .header { text-align: center; margin-bottom: 2rem; }
  .header-deco { font-size: 1.4rem; letter-spacing: 4px; color: #FF6EB4; margin-bottom: 0.5rem; animation: sparkle 2s infinite; }
  @keyframes sparkle { 0%,100%{opacity:1}50%{opacity:0.4} }
  .header h1 { font-family: 'Jua', sans-serif; font-size: 2.2rem; color: #6C3483; text-shadow: 3px 3px 0px #FF6EB4; margin-bottom: 0.3rem; }
  .header p { font-size: 0.9rem; color: #9B59B6; }

  .api-box {
    background: white;
    border: 3px solid #9B59B6;
    border-radius: 16px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 4px 4px 0px #E8D5F5;
  }
  .api-box label { display: block; font-size: 0.78rem; font-weight: 800; color: #9B59B6; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  .api-row { display: flex; gap: 8px; }
  .api-row input {
    flex: 1; padding: 8px 12px;
    border: 2px solid #E8D5F5; border-radius: 10px;
    font-family: 'Nanum Gothic', sans-serif; font-size: 0.85rem; color: #3D1A5C;
    outline: none; transition: border-color 0.2s;
  }
  .api-row input:focus { border-color: #9B59B6; }
  .btn-save {
    padding: 8px 16px; background: #9B59B6; color: white;
    border: none; border-radius: 10px;
    font-family: 'Jua', sans-serif; font-size: 0.9rem;
    cursor: pointer; transition: transform 0.1s;
  }
  .btn-save:active { transform: scale(0.95); }
  .api-status { font-size: 0.75rem; color: #9B59B6; margin-top: 6px; min-height: 16px; }
  .api-hint { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
  .api-hint a { color: #FF6EB4; }

  .btn-generate {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #FF6EB4, #9B59B6);
    color: white; border: none; border-radius: 16px;
    font-family: 'Jua', sans-serif; font-size: 1.2rem;
    cursor: pointer; margin-bottom: 1rem;
    box-shadow: 0 4px 0px #6C3483;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.05em;
  }
  .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 0px #6C3483; }
  .btn-generate:active { transform: translateY(2px); box-shadow: 0 2px 0px #6C3483; }
  .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: 0 4px 0px #6C3483; }

  .status { text-align: center; font-size: 0.85rem; color: #9B59B6; margin-bottom: 1rem; min-height: 20px; font-weight: 700; }

  .grade-grid { display: flex; flex-direction: column; gap: 14px; }

  .grade-card {
    background: white; border-radius: 16px;
    padding: 1.2rem 1.4rem;
    border: 2.5px solid #E8D5F5;
    box-shadow: 3px 3px 0px #E8D5F5;
    transition: transform 0.2s;
  }
  .grade-card:hover { transform: translateY(-2px); }
  .grade-card.s { border-color: #FFD700; box-shadow: 3px 3px 0px #FFD700; }
  .grade-card.a { border-color: #A8E6CF; box-shadow: 3px 3px 0px #A8E6CF; }
  .grade-card.b { border-color: #87CEEB; box-shadow: 3px 3px 0px #87CEEB; }
  .grade-card.c { border-color: #FFB347; box-shadow: 3px 3px 0px #FFB347; }
  .grade-card.f { border-color: #FF6B6B; box-shadow: 3px 3px 0px #FF6B6B; }

  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

  .grade-badge { font-family: 'Jua', sans-serif; font-size: 1rem; padding: 3px 14px; border-radius: 20px; flex-shrink: 0; }
  .s .grade-badge { background: #FFF8DC; color: #B8860B; border: 2px solid #FFD700; }
  .a .grade-badge { background: #E8F8F0; color: #1A7A4A; border: 2px solid #A8E6CF; }
  .b .grade-badge { background: #EBF5FB; color: #1A5276; border: 2px solid #87CEEB; }
  .c .grade-badge { background: #FEF9E7; color: #7D6608; border: 2px solid #FFB347; }
  .f .grade-badge { background: #FDEDEC; color: #922B21; border: 2px solid #FF6B6B; }

  .grade-word { font-family: 'Jua', sans-serif; font-size: 1.6rem; color: #3D1A5C; }

  .btn-regen {
    margin-left: auto; padding: 4px 12px;
    background: #FDF0FF; border: 1.5px solid #E8D5F5;
    border-radius: 8px; font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.75rem; color: #9B59B6; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-regen:hover { background: #E8D5F5; }

  .first-line {
    font-size: 0.95rem; color: #6C3483; font-weight: 800; font-style: italic;
    padding: 8px 12px; background: #FDF0FF; border-radius: 10px;
    margin-bottom: 10px; border-left: 4px solid #FF6EB4; line-height: 1.5;
  }

  .feedback-label { font-size: 0.7rem; font-weight: 800; letter-spacing: 0.08em; margin-top: 10px; margin-bottom: 4px; }
  .label-good { color: #1A7A4A; }
  .label-improve { color: #B7770D; }
  .feedback-item { font-size: 0.85rem; color: #555; margin-bottom: 3px; padding-left: 4px; line-height: 1.5; }

  .skeleton {
    background: linear-gradient(90deg, #E8D5F5 25%, #f0e0ff 50%, #E8D5F5 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 6px; height: 14px; margin-bottom: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

  .loading-dot { display: inline-block; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

  .error-msg { font-size: 0.82rem; color: #E74C3C; padding: 4px 0; line-height: 1.5; word-break: break-all; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-deco">✦ ✦ ✦</div>
    <h1>AI 패션 판독기</h1>
    <p>짝퉁 패션러를 걸러내는 냉정한 AI의 눈 👁</p>
  </div>

  <div class="api-box">
    <label>GEMINI API KEY</label>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="AIza..." />
      <button class="btn-save" onclick="saveKey()">저장</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
    <div class="api-hint">
      키 발급 → <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> (무료)
    </div>
  </div>

  <button class="btn-generate" id="btnGenerate" onclick="generateAll()">
    ✨ 등급별 문구 생성하기 ✨
  </button>

  <div class="status" id="status"></div>
  <div class="grade-grid" id="gradeGrid"></div>

</div>
<script>
const GRADES = [
  { key: 'S', cls: 's', vibe: '넘사벽 칭찬, 완벽함, 감탄' },
  { key: 'A', cls: 'a', vibe: '아쉽지만 잘함, 거의 다 왔음' },
  { key: 'B', cls: 'b', vibe: '무난함, 평타, 그냥저냥' },
  { key: 'C', cls: 'c', vibe: '의아함, 갸우뚱, 아쉬움' },
  { key: 'F', cls: 'f', vibe: '충격, 당혹, 어이없음' },
];

const TONE = {
  S: '순수 칭찬. 플래시 게임 심사위원처럼 짧고 직접적인 감탄. ex) "오 이거 진짜 잘 입었는데_"',
  A: '유아 퇴행 말투 살짝. "~당 ㅠㅠ", "넘무", "아쉽당" 느낌. ex) "거의 다 좋은데 딱 한 개가 아쉬워서 너무 속상하당 ㅠㅠ"',
  B: '꽈배기 비꼬기. "내가 알았다~ ㅋㅋ" 느낌. ex) "내가 이 신발이랑 이 바지 같이 입으면 어떻게 될지 알았다~ ㅋㅋ"',
  C: '자기방어적 말투. "어짜라고", "내가 일부러 그랬냐?" 느낌. ex) "색도 이상하고 핏도 이상하고_ 어짜라고, 내가 일부러 이러냐?"',
  F: '유아퇴행+비꼬기+자기방어 풀콤보. ex) "스타일도 엉망이고 색도 엉망이고 내가 너 이럴 줄 알았다~ ㅋㅋ 어짜라고, 힝 너무 속상하당 ㅠㅠ"',
};

let savedKey = '';

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) { document.getElementById('apiStatus').textContent = 'API 키를 입력해주세요.'; return; }
  savedKey = k;
  document.getElementById('apiStatus').textContent = '✓ 저장됐어요!';
}

function setStatus(msg) { document.getElementById('status').innerHTML = msg; }

function getCard(grade) {
  const grid = document.getElementById('gradeGrid');
  let card = document.getElementById('card-' + grade.key);
  if (!card) {
    card = document.createElement('div');
    card.id = 'card-' + grade.key;
    card.className = 'grade-card ' + grade.cls;
    grid.appendChild(card);
  }
  return card;
}

function renderSkeleton(grade) {
  getCard(grade).innerHTML = `
    <div class="card-header">
      <span class="grade-badge">${grade.key}</span>
      <span style="font-size:0.85rem;color:#aaa;">생성 중<span class="loading-dot">...</span></span>
    </div>
    <div class="skeleton" style="width:35%;height:24px;margin-bottom:14px;"></div>
    <div class="skeleton" style="width:95%;"></div>
    <div class="skeleton" style="width:80%;"></div>
    <div class="skeleton" style="width:90%;margin-top:10px;"></div>
    <div class="skeleton" style="width:75%;"></div>`;
}

function renderCard(grade, data) {
  const improveHtml = (grade.key !== 'S' && data.improve && data.improve.length)
    ? '<div class="feedback-label label-improve">개선하면 더 좋을 점</div>' +
      data.improve.map(i => '<div class="feedback-item">• ' + i + '</div>').join('')
    : '';
  getCard(grade).innerHTML = `
    <div class="card-header">
      <span class="grade-badge">${grade.key}</span>
      <span class="grade-word">${data.one_word || ''}</span>
      <button class="btn-regen" onclick="regenOne('${grade.key}')">다시 생성</button>
    </div>
    <div class="first-line">"${data.first_line || ''}"</div>
    <div class="feedback-label label-good">잘된 점</div>
    ${(data.good || []).map(g => '<div class="feedback-item">• ' + g + '</div>').join('')}
    ${improveHtml}`;
}

function renderError(grade, msg) {
  getCard(grade).innerHTML = `
    <div class="card-header">
      <span class="grade-badge">${grade.key}</span>
      <span style="font-size:0.85rem;color:#E74C3C;">오류 발생</span>
      <button class="btn-regen" onclick="regenOne('${grade.key}')">다시 시도</button>
    </div>
    <div class="error-msg">${msg}</div>`;
}

async function callGemini(apiKey, grade) {
  const prompt = `지금 한국 인스타그램, X(트위터)에서 유행하는 패션/스타일/외모 관련 최신 신조어나 밈 단어 중 ${grade.key}등급(${grade.vibe})에 딱 어울리는 단어 1개를 골라줘.

그리고 아래 조건으로 OOTD 패션 평가 피드백을 만들어줘.

[첫 줄 톤 규칙]
${TONE[grade.key]}
- 반말, 짧게 1~2문장으로
- 실제 코디를 본 것처럼 구체적인 패션 언급 포함

[나머지 피드백 규칙]
- 존댓말, 친절한 톤으로 전환
- 잘된 점 2가지: 구체적인 패션 아이템/색조합/스타일 언급
- 개선점 2가지 (S등급은 빈 배열로): 구체적으로 뭘 어떻게 바꾸면 되는지
- 전문용어 없이 누구나 이해하는 언어로

아래 JSON만 출력 (다른 텍스트 없이):
{
  "one_word": "트렌드 단어 1개",
  "first_line": "킹받는 첫 줄 문구",
  "good": ["잘된 점1", "잘된 점2"],
  "improve": ["개선점1", "개선점2"]
}`;

  let res;
  try {
    res = await fetch('/api/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey: apiKey, prompt: prompt })
    });
  } catch (e) {
    throw new Error('서버 연결 실패 — node server.js가 실행 중인지 확인해주세요.');
  }

  let data;
  try {
    data = await res.json();
  } catch (e) {
    throw new Error('응답 파싱 실패 (status: ' + res.status + ')');
  }

  if (!res.ok) {
    const msg = (data && data.error && data.error.message)
      ? data.error.message
      : (data && data.error ? String(data.error) : 'API 오류 ' + res.status);
    throw new Error(msg);
  }

  const raw = data && data.candidates && data.candidates[0] &&
    data.candidates[0].content && data.candidates[0].content.parts &&
    data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text
    ? data.candidates[0].content.parts[0].text : '';

  if (!raw) {
    const apiErr = data && data.error
      ? (typeof data.error === 'string' ? data.error : JSON.stringify(data.error))
      : 'Gemini 응답이 비어있어요. API 키를 확인해주세요.';
    throw new Error(apiErr);
  }

  try {
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch (e) {
    throw new Error('JSON 파싱 실패: ' + raw.slice(0, 100));
  }
}

async function generateAll() {
  const key = savedKey || document.getElementById('apiKey').value.trim();
  if (!key) { setStatus('API 키를 먼저 입력해주세요!'); return; }
  savedKey = key;

  document.getElementById('gradeGrid').innerHTML = '';
  document.getElementById('btnGenerate').disabled = true;
  GRADES.forEach(g => renderSkeleton(g));
  setStatus('✨ Gemini가 트렌드 단어 수집 중<span class="loading-dot">...</span>');

  for (let i = 0; i < GRADES.length; i++) {
    const grade = GRADES[i];
    setStatus('✨ ' + grade.key + ' 등급 생성 중... (' + (i+1) + '/' + GRADES.length + ')');
    try {
      const data = await callGemini(key, grade);
      renderCard(grade, data);
    } catch (e) {
      renderError(grade, e.message || String(e));
    }
    if (i < GRADES.length - 1) await new Promise(r => setTimeout(r, 1500));
  }

  document.getElementById('btnGenerate').disabled = false;
  setStatus('✨ 생성 완료!');
}

async function regenOne(gradeKey) {
  const key = savedKey || document.getElementById('apiKey').value.trim();
  if (!key) { setStatus('API 키를 먼저 입력해주세요!'); return; }
  const grade = GRADES.find(function(g) { return g.key === gradeKey; });
  renderSkeleton(grade);
  try {
    const data = await callGemini(key, grade);
    renderCard(grade, data);
  } catch (e) {
    renderError(grade, e.message || String(e));
  }
}
</script>
</body>
</html>
